<div class="layout">
  <aside class="sidebar" aria-label="Filtros">
    <h2 class="sidebar-title">Filtrar por</h2>

    <div class="filter-accordion">

      <details class="filter-section">
        <summary class="filter-label">Raza</summary>
        <select class="filter-select" id="filter-breed">
          <option value="all">Todas</option>
        </select>
      </details>

      <details class="filter-section">
        <summary class="filter-label">Edad</summary>
        <select class="filter-select" id="filter-age">
          <option value="all">Todas</option>
          <option value="Cachorro (0-2 años)">Cachorro (0-2 años)</option>
          <option value="Adulto (3-6 años)">Adulto (3-6 años)</option>
          <option value="Senior (7+ años)">Senior (7+ años)</option>
        </select>
      </details>

      <details class="filter-section">
        <summary class="filter-label">Peso</summary>
        <select class="filter-select" id="filter-weight">
          <option value="all">Todos</option>
          <option value="Pequeño (≤5kg)">Pequeño (≤5kg)</option>
          <option value="Mediano (6-15kg)">Mediano (6-15kg)</option>
          <option value="Grande (>15kg)">Grande (>15kg)</option>
        </select>
      </details>

      <details class="filter-section">
        <summary class="filter-label">Tipo de pelo</summary>
        <select class="filter-select" id="filter-hair">
          <option value="all">Todos</option>
        </select>
      </details>

      <details class="filter-section">
        <summary class="filter-label">Comportamiento</summary>
        <select class="filter-select" id="filter-mood">
          <option value="all">Todos</option>
        </select>
      </details>

      <details class="filter-section">
        <summary class="filter-label">Ordenar por</summary>
        <select class="filter-select" id="sort-select">
          <option value="">Sin orden</option>
          <option value="age-asc">Edad ↑</option>
          <option value="age-desc">Edad ↓</option>
          <option value="weight-asc">Peso ↑</option>
          <option value="weight-desc">Peso ↓</option>
        </select>
      </details>

    </div>

    <button class="filter-reset" id="filter-reset">Limpiar filtros</button>

  </aside>

  <section class="pets-list">
    <div class="results-count" id="results-count"></div>
    <div id="pets-list"></div>
  </section>
</div>

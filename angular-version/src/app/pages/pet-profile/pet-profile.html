@if (mascota(); as pet) {
  <section class="dog-profile">

    <div class="profile-carousel">
      <button class="profile-carousel-btn" (click)="prevImage()">
        <i class="bi bi-arrow-left"></i>
      </button>

      <div class="profile-carousel-track-wrapper">
        <button
          type="button"
          class="favorite-btn"
          [class.is-favorite]="isFavorite"
          [attr.aria-label]="isFavorite ? 'Quitar de favoritos' : 'Anadir a favoritos'"
          [attr.title]="isAuthenticated ? (isFavorite ? 'Quitar de favoritos' : 'Anadir a favoritos') : 'Inicia sesion para guardar favoritos'"
          (click)="toggleFavorite($event)">
          <i class="bi" [class.bi-heart]="!isFavorite" [class.bi-heart-fill]="isFavorite"></i>
        </button>

        <div class="profile-carousel-track"
             [style.transform]="'translateX(-' + (currentImageIndex() * 100) + '%)'"
             [style.transition]="isAnimating() ? 'transform 0.4s cubic-bezier(0.4, 0, 0.2, 1)' : 'none'">

          @for (img of pet.images; track $index) {
            <img [src]="img" class="profile-carousel-slide" alt="Foto de {{pet.name}}">
          }

          <img [src]="pet.images[0]" class="profile-carousel-slide" alt="Copia de seguridad">

        </div>
      </div>

      <button class="profile-carousel-btn" (click)="nextImage()">
        <i class="bi bi-arrow-right"></i>
      </button>
    </div>

    <div class="column-data">
      <div class="profile-actions">
        <button class="btn-back" (click)="volver()">
          <i class="bi bi-arrow-left"></i> Volver
        </button>

        <button class="btn-book" (click)="reservarCita()">
          <i class="bi bi-calendar-check"></i> Reservar cita
        </button>
      </div>

      <div class="box-text"><strong>Nombre:</strong> {{pet.name}}</div>
      <div class="box-text"><strong>Raza:</strong> {{pet.breed}}</div>
      <div class="box-text">
        <strong>Género:</strong>
        {{pet.gender === 'Male' ? 'Macho' : 'Hembra'}}
      </div>
      <div class="box-text"><strong>Edad:</strong> {{pet.age}} años</div>
      <div class="box-text"><strong>Peso:</strong> {{pet.weight}}</div>

      <div class="box-text description-box">
        <strong>Sobre {{pet.name}}:</strong><br>
        {{pet.description}}
      </div>
    </div>

  </section>
} @else {
  <div class="loading">Cargando perfil...</div>
}

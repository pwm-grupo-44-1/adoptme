<div id="about_us">
  @for (member of members(); track member.name) {
    <section class="card-about_us">
      <img
        class="photo-card-about_us"
        [src]="member.image"
        [alt]="'Foto de ' + member.name"
      >

      <h2>{{ member.name }}</h2>
      <h3>{{ member.role }}</h3>
      <p class="text-card-about_us">{{ member.description }}</p>
    </section>
  }
</div>

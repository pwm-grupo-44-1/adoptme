<header class="header">
  <div class="header-inner">
    <div class="header-left">
      <img src="/logo-adoptme.png" alt="Logo AdoptMe" class="logo-img">

      <div class="brand-block">
        <a class="brand-text" [routerLink]="['/']">
          {{ brandTitle }}
        </a>

        <div class="socials">
          @for (social of socialLinks; track social.name) {
            <a
              class="social-ico"
              [href]="social.url"
              target="_blank"
              rel="noopener noreferrer"
              [attr.aria-label]="social.name"
            >
              <i [class]="social.icon"></i>
            </a>
          }
        </div>
      </div>
    </div>

    <button
      class="hamburger-btn"
      type="button"
      aria-label="Abrir menú"
      [attr.aria-expanded]="menuOpen"
      (click)="toggleMenu()"
    >
      <span [class.active-top]="menuOpen"></span>
      <span [class.active-middle]="menuOpen"></span>
      <span [class.active-bottom]="menuOpen"></span>
    </button>

    <nav class="main-nav" [class.open]="menuOpen">
      @for (link of navLinks; track link.name) {
        @if (link.name === 'Acceder' && authService.currentUser()) {
          <div class="user-auth-info">
            <span class="user-name">{{ authService.currentUser()?.name }}</span>
            <button class="logout-btn" (click)="logout()">Cerrar sesión</button>
          </div>
        } @else {
          <a
            class="nav-link"
            [class.drawer-only-link]="link.mobileOnly"
            [routerLink]="link.url"
            (click)="closeMenu()"
          >
            {{ link.name }}
          </a>
        }
      }
    </nav>
  </div>

  <div class="nav-overlay" [class.show]="menuOpen" (click)="closeMenu()"></div>
</header>

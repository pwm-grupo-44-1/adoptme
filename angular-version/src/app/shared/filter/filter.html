<aside class="sidebar" aria-label="Filtros">
  <h2 class="sidebar-title">Filtrar por</h2>

  <div class="filter-accordion">

    <details class="filter-section">
      <summary class="filter-label">Género</summary>
      <div class="filter-options" id="filter-gender">
        <label>
          <input type="checkbox" [checked]="generosSeleccionados.has('Male')" (change)="toggleFiltro(generosSeleccionados, 'Male')"> Macho
        </label>
        <label>
          <input type="checkbox" [checked]="generosSeleccionados.has('Female')" (change)="toggleFiltro(generosSeleccionados, 'Female')"> Hembra
        </label>
      </div>
    </details>

    <details class="filter-section">
      <summary class="filter-label">Raza</summary>
      <div class="filter-options" id="filter-breed">
        @for (raza of razas; track raza) {
          <label>
            <input type="checkbox" [checked]="razasSeleccionadas.has(raza)" (change)="toggleFiltro(razasSeleccionadas, raza)"> {{ raza }}
          </label>
        }
      </div>
    </details>

    <details class="filter-section">
      <summary class="filter-label">Edad</summary>
      <div class="filter-options" id="filter-age">
        <label><input type="checkbox" [checked]="edadesSeleccionadas.has('Cachorro (0-2 años)')" (change)="toggleFiltro(edadesSeleccionadas, 'Cachorro (0-2 años)')"> Cachorro (0-2 años)</label>
        <label><input type="checkbox" [checked]="edadesSeleccionadas.has('Adulto (3-6 años)')" (change)="toggleFiltro(edadesSeleccionadas, 'Adulto (3-6 años)')"> Adulto (3-6 años)</label>
        <label><input type="checkbox" [checked]="edadesSeleccionadas.has('Senior (7+ años)')" (change)="toggleFiltro(edadesSeleccionadas, 'Senior (7+ años)')"> Senior (7+ años)</label>
      </div>
    </details>

    <details class="filter-section">
      <summary class="filter-label">Peso</summary>
      <div class="filter-options" id="filter-weight">
        <label><input type="checkbox" [checked]="pesosSeleccionados.has('Pequeño (≤5kg)')" (change)="toggleFiltro(pesosSeleccionados, 'Pequeño (≤5kg)')"> Pequeño (≤5kg)</label>
        <label><input type="checkbox" [checked]="pesosSeleccionados.has('Mediano (6-15kg)')" (change)="toggleFiltro(pesosSeleccionados, 'Mediano (6-15kg)')"> Mediano (6-15kg)</label>
        <label><input type="checkbox" [checked]="pesosSeleccionados.has('Grande (>15kg)')" (change)="toggleFiltro(pesosSeleccionados, 'Grande (>15kg)')"> Grande (>15kg)</label>
      </div>
    </details>

    <details class="filter-section">
      <summary class="filter-label">Tipo de pelo</summary>
      <div class="filter-options" id="filter-hair">
        @for (pelo of pelos; track pelo) {
          <label>
            <input type="checkbox" [checked]="pelosSeleccionados.has(pelo)" (change)="toggleFiltro(pelosSeleccionados, pelo)"> {{ pelo }}
          </label>
        }
      </div>
    </details>

    <details class="filter-section">
      <summary class="filter-label">Comportamiento</summary>
      <div class="filter-options" id="filter-mood">
        @for (caracter of caracteres; track caracter) {
          <label>
            <input type="checkbox" [checked]="caracteresSeleccionados.has(caracter)" (change)="toggleFiltro(caracteresSeleccionados, caracter)"> {{ caracter }}
          </label>
        }
      </div>
    </details>

    <details class="filter-section">
      <summary class="filter-label">Ordenar por</summary>
      <select class="filter-select" id="sort-select" [value]="ordenSeleccionado" (change)="cambiarOrden($event)">
        <option value="">Sin orden</option>
        <option value="age-asc">Edad ↑</option>
        <option value="age-desc">Edad ↓</option>
        <option value="weight-asc">Peso ↑</option>
        <option value="weight-desc">Peso ↓</option>
      </select>
    </details>

  </div>

  <button class="filter-reset" (click)="resetFiltros()">Limpiar filtros</button>
</aside>
